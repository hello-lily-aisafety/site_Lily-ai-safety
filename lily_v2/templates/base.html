<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LILY AI Safety Alliance{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <!-- Language switcher bar -->
  <div class="lang-bar">
    <div class="lang-bar-inner">
      <span class="lang-label" data-i18n="lang_label">Language:</span>
      <div class="lang-btns">
        <button class="lang-btn active" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('pt')">PT</button>
        <button class="lang-btn" onclick="setLang('es')">ES</button>
      </div>
    </div>
  </div>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="logo">
        <!-- SVG Logo LILY -->
        <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
          <rect width="38" height="38" rx="9" fill="url(#lg)"/>
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="38" y2="38" gradientUnits="userSpaceOnUse">
              <stop stop-color="#534AB7"/>
              <stop offset="1" stop-color="#378ADD"/>
            </linearGradient>
          </defs>
          <!-- Lily flower simplified -->
          <ellipse cx="19" cy="13" rx="3" ry="6" fill="white" opacity="0.9" transform="rotate(0 19 19)"/>
          <ellipse cx="19" cy="13" rx="3" ry="6" fill="white" opacity="0.7" transform="rotate(60 19 19)"/>
          <ellipse cx="19" cy="13" rx="3" ry="6" fill="white" opacity="0.7" transform="rotate(120 19 19)"/>
          <ellipse cx="19" cy="13" rx="3" ry="6" fill="white" opacity="0.9" transform="rotate(180 19 19)"/>
          <ellipse cx="19" cy="13" rx="3" ry="6" fill="white" opacity="0.7" transform="rotate(240 19 19)"/>
          <ellipse cx="19" cy="13" rx="3" ry="6" fill="white" opacity="0.7" transform="rotate(300 19 19)"/>
          <circle cx="19" cy="19" r="4" fill="white"/>
        </svg>
        <span class="logo-text">LILY<span class="logo-sub">AI Safety Alliance</span></span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" data-i18n="nav_home">home</a></li>
        <li><a href="/about" class="nav-link {% if request.endpoint == 'about' %}active{% endif %}" data-i18n="nav_about">About</a></li>
        <li><a href="/seals" class="nav-link {% if request.endpoint == 'seals' %}active{% endif %}" data-i18n="nav_seals">LILY Seals</a></li>
        <li><a href="/citizen" class="nav-link {% if request.endpoint == 'citizen' %}active{% endif %}" data-i18n="nav_citizen">AI & Citizen</a></li>
        <li><a href="/members" class="nav-link {% if request.endpoint == 'members' %}active{% endif %}" data-i18n="nav_members">Members</a></li>
        <li><a href="/contact" class="nav-link {% if request.endpoint == 'contact' %}active{% endif %}" data-i18n="nav_contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-left">
        <p class="footer-name">LILY AI Safety Alliance</p>
        <p class="footer-tagline" data-i18n="footer_tagline">Lead Initiative for Liberty &amp; Youth in AI</p>
      </div>
      <div class="footer-links">
        <a href="/about" data-i18n="nav_about">About</a>
        <a href="/seals" data-i18n="nav_seals">LILY Seals</a>
        <a href="/contact" data-i18n="nav_contact">Contact</a>
      </div>
      <p class="footer-copy">&copy; 2025 LILY AI Safety Alliance</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
  <script>
    const toggle = document.getElementById('navToggle');
    const links = document.getElementById('navLinks');
    toggle.addEventListener('click', () => links.classList.toggle('open'));
  </script>
</body>
</html>
